<!-- templates/base.html (Corrected Logic) -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Aetherium Gallery{% endblock %}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', path='/css/style.css') }}"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/basiclightbox@5.0.4/dist/basicLightbox.min.css"
    />
    <!-- Styles for the toggle switch (Unchanged) -->
    <style>
      .safe-mode-toggle {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        user-select: none;
      }
      .toggle-switch {
        position: relative;
        display: inline-block;
        width: 44px;
        height: 24px;
      }
      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #555;
        border-radius: 24px;
        transition: 0.4s;
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 18px;
        width: 18px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        border-radius: 50%;
        transition: 0.4s;
      }
      /* This logic is now consistent: NOT checked = NSFW mode (red) */
      input:not(:checked) + .slider {
        background-color: #e57373;
      }
      /* CHECKED = SFW mode (green) */
      input:checked + .slider {
        background-color: #81c784;
      }

      input:checked + .slider:before {
        transform: translateX(20px);
      }

      .media-filter-group {
        display: flex;
        align-items: center;
        background-color: #333;
        border-radius: 6px;
        border: 1px solid #555;
        overflow: hidden; /* Ensures the rounded corners apply to the children */
      }
      .media-filter-button {
        background: none;
        border: none;
        color: #ccc;
        padding: 0.4rem 1rem;
        cursor: pointer;
        font-size: 0.9em;
        font-weight: bold;
        border-left: 1px solid #555;
        transition: all 0.2s ease;
      }
      .media-filter-button:first-child {
        border-left: none; /* No border on the first button */
      }
      .media-filter-button:hover {
        background-color: #444;
      }
      .media-filter-button.active {
        background-color: #64b5f6;
        color: #111;
      }
    </style>
    {% block head_extra %}{% endblock %}
  </head>
  <body 
  data-api-bulk-url="{{ url_for('bulk_update_images_api') }}"
  data-api-album-url="/api/album"
  data-upload-base-url="{{ url_for('uploads', path='') }}"
>
    <header>
      <nav>
        <a href="{{ url_for('gallery_index') }}">Aetherium Gallery</a>
        <ul>
          <li><a href="{{ url_for('gallery_index') }}">Gallery</a></li>
          <li><a href="{{ url_for('list_albums') }}">Albums</a></li>
          <li><a href="{{ url_for('view_stats') }}">Stats</a></li>
          <li><a href="{{ url_for('upload_form') }}">Upload</a></li>

          <li>
            <label
              for="safe-mode-checkbox"
              class="safe-mode-toggle"
              title="Toggle Safe Mode"
            >
              <span>NSFW</span>
              <div class="toggle-switch">
                <!--
                  ▼▼▼ LOGIC CORRECTION 1 ▼▼▼
                  The checkbox is now CHECKED when safe_mode from the backend is true.
                  This makes the initial state match the JavaScript's expectation.
                -->
                <input
                  type="checkbox"
                  id="safe-mode-checkbox"
                  {%
                  if
                  safe_mode
                  %}checked{%
                  endif
                  %}
                />
                <span class="slider"></span>
              </div>
              <span>SFW</span>
            </label>
          </li>
          <li>
            <div id="media-filter" class="media-filter-group">
              <button
                class="media-filter-button {% if media_filter == 'all' %}active{% endif %}"
                data-filter="all"
              >
                All
              </button>
              <button
                class="media-filter-button {% if media_filter == 'image' %}active{% endif %}"
                data-filter="image"
              >
                Images
              </button>
              <button
                class="media-filter-button {% if media_filter == 'video' %}active{% endif %}"
                data-filter="video"
              >
                Videos
              </button>
            </div>
          </li>
          <!-- ▼▼▼ ADD THIS NEW LIST ITEM ▼▼▼ -->
          <li>
            <form
              action="{{ url_for('search') }}"
              method="get"
              class="search-form"
            >
              <input
                type="search"
                name="q"
                placeholder="Search prompts..."
                required
                minlength="2"
              />
              <button type="submit">Search</button>
            </form>
          </li>
          <li>
            <button
              type="button"
              id="select-mode-button"
              class="select-mode-button"
            >
              Select
            </button>
          </li>
        </ul>
      </nav>
    </header>

    <main>{% block content %} {% endblock %}</main>

    <footer>
      <p>© {{ now().year }} Aetherium Gallery</p>
    </footer>
   <!-- 2. Load external libraries first -->
  <script src="https://cdn.jsdelivr.net/npm/basiclightbox@5.0.4/dist/basicLightbox.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  
  <!-- 3. Load your centralized script -->
  <script src="{{ url_for('static', path='/js/script.js') }}"></script>

  <!-- 4. Keep this tiny block for child-page specific overrides if ever needed -->
  {% block scripts_extra %}{% endblock %}
  </body>
</html>
